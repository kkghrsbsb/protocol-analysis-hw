name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.4.36
      MDBOOK_KATEX_VERSION: 0.9.4
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + mdBook + mdbook-katex
        shell: bash
        run: |
          set -euo pipefail

          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          rustup update

          cargo install --version "${MDBOOK_VERSION}" mdbook --locked
          cargo install --version "${MDBOOK_KATEX_VERSION}" mdbook-katex --locked

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with mdBook
        shell: bash
        run: |
          set -euo pipefail
          mdbook build docs
          test -f docs/book/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/book

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
